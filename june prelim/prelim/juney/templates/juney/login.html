<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: 0.5s;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
        }

        body.dark {
            background: linear-gradient(-45deg, #141e30, #243b55);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating particles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-100px); }
            100% { transform: translateY(0); }
        }

        .login-box {
            position: relative;
            width: 380px;
            padding: 45px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            color: white;
            text-align: center;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box input {
            width: 100%;
            padding: 12px 40px 12px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.7);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-box label {
            position: absolute;
            top: 12px;
            left: 0;
            pointer-events: none;
            transition: 0.3s;
            color: rgba(255,255,255,0.8);
        }

        .input-box input:focus ~ label,
        .input-box input:valid ~ label {
            top: -12px;
            font-size: 12px;
            color: #fff;
        }

        .toggle-password {
            position: absolute;
            right: 0;
            top: 12px;
            cursor: pointer;
            font-size: 14px;
            color: #fff;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: white;
            color: #764ba2;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: #764ba2;
            color: white;
            transform: translateY(-3px);
        }

        .error {
            background: rgba(255,0,0,0.2);
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <!-- Floating circles -->
    <div class="circle" style="width:100px;height:100px;top:10%;left:10%;"></div>
    <div class="circle" style="width:150px;height:150px;bottom:10%;right:10%;animation-delay:2s;"></div>
    <div class="circle" style="width:80px;height:80px;bottom:20%;left:20%;animation-delay:4s;"></div>

    <div class="theme-toggle" onclick="toggleTheme()">🌙 Toggle</div>

    <div class="login-box">
        <h2>Welcome Back</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="input-box">
                <input type="text" name="username" required>
                <label>Username</label>
            </div>

            <div class="input-box">
                <input type="password" id="password" name="password" required>
                <label>Password</label>
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>
    </div>

    <script>
        function togglePassword() {
            const password = document.getElementById("password");
            password.type = password.type === "password" ? "text" : "password";
        }

        function toggleTheme() {
            document.body.classList.toggle("dark");
        }
    </script>

</body>
</html>
